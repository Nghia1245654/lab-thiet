name: CI Build, Test, and Scan

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  id-token: write   # Required for OIDC AWS authentication
  contents: read    # Required for checkout

jobs:
  lint-and-scan:
    name: Lint & Secrets Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks Scan
        run: |
          docker run --rm -v ${{ github.workspace }}:/path zricethezav/gitleaks:latest detect --source=/path --verbose --redact --config=/path/.gitleaks.toml

  unit-tests:
    name: Unit Tests & Coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov boto3

      - name: Run Pytest
        run: |
          pytest services/ --cov=services/ --cov-report=term-missing --cov-fail-under=70

  build-and-push:
    name: Build & Push ECR
    runs-on: ubuntu-latest
    needs: [lint-and-scan, unit-tests]
    env:
      AWS_REGION: us-east-1
      ROLE_TO_ASSUME: arn:aws:iam::022267198114:role/tf1-github-actions-ci-role
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}
          audience: sts.amazonaws.com

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set Image Tag
        run: echo "IMAGE_TAG=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      # --- 1. Ingest Lambda ---
      - name: Build Ingest Lambda Image
        run: |
          docker build -t ${{ steps.login-ecr.outputs.registry }}/tf1/ingest-lambda:${{ env.IMAGE_TAG }} -f services/ingest-lambda/Dockerfile services/ingest-lambda

      - name: Scan Ingest Lambda with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.login-ecr.outputs.registry }}/tf1/ingest-lambda:${{ env.IMAGE_TAG }}
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'HIGH,CRITICAL'

      - name: Push Ingest Lambda Image
        run: |
          docker push ${{ steps.login-ecr.outputs.registry }}/tf1/ingest-lambda:${{ env.IMAGE_TAG }}

      # --- 2. Integration Lambda ---
      - name: Build Integration Lambda Image
        run: |
          docker build -t ${{ steps.login-ecr.outputs.registry }}/tf1/integration-lambda:${{ env.IMAGE_TAG }} -f services/integration-lambda/Dockerfile services/integration-lambda

      - name: Scan Integration Lambda with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.login-ecr.outputs.registry }}/tf1/integration-lambda:${{ env.IMAGE_TAG }}
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'HIGH,CRITICAL'

      - name: Push Integration Lambda Image
        run: |
          docker push ${{ steps.login-ecr.outputs.registry }}/tf1/integration-lambda:${{ env.IMAGE_TAG }}

      # --- 3. Correlator Worker ---
      - name: Build Correlator Worker Image
        run: |
          docker build -t ${{ steps.login-ecr.outputs.registry }}/tf1/correlator-worker:${{ env.IMAGE_TAG }} -f services/correlator-worker/Dockerfile services/correlator-worker

      - name: Scan Correlator Worker with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.login-ecr.outputs.registry }}/tf1/correlator-worker:${{ env.IMAGE_TAG }}
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'HIGH,CRITICAL'

      - name: Push Correlator Worker Image
        run: |
          docker push ${{ steps.login-ecr.outputs.registry }}/tf1/correlator-worker:${{ env.IMAGE_TAG }}
