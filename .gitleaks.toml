# Gitleaks config
title = "gitleaks config"

[[rules]]
    id = "aws-access-key"
    description = "AWS Access Key ID"
    regex = '''(A3T[A-Z0-9]|AKIA|AGPA|AIDA|AROA|AIPA|ANPA|ANVA|ASIA)[A-Z0-9]{16}'''
    tags = ["key", "AWS"]

[[rules]]
    id = "aws-secret-key"
    description = "AWS Secret Access Key"
    regex = '''(?i)aws_(?:secret|key|token|passwd|password)[\w\s=-]{0,20}[:=]{1,3}[\w\s=-]{0,20}[a-zA-Z0-9/+=]{40}'''
    tags = ["key", "AWS"]
